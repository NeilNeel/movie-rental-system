<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Home | Movie Rental</title>
    <link href="styles.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-black text-white font-retro">
    <header>
      <nav
        class="bg-deepGray text-neonMint px-6 py-4 flex justify-between items-center"
      >
        <a href="index.html" class="text-sm font-bold tracking-widest"
          >🎬 Movie Rental</a
        >
        <ul class="flex space-x-6 text-xs">
          <li><a href="index.html" class="hover:text-white">Home</a></li>
          <li>
            <a href="my-movies.html" class="hover:text-white"
              >My Rented Movies</a
            >
          </li>
          <li><a href="login.html" class="hover:text-white">Login</a></li>
        </ul>
      </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main>
      <section
        class="search-bar--section mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4"
      >
        <input
          type="text"
          placeholder="Search movies..."
          class="search-bar--inputpx-4 py-2 rounded bg-deepGray text-white placeholder-neonMint w-full md:w-1/3"
        />

        <div class="search-bar--genre flex gap-2">
          <select class="bg-deepGray text-white px-4 py-2 rounded">
            <option value="">Genre</option>
            <option>Action</option>
            <option>Drama</option>
            <option>Comedy</option>
          </select>

          <select
            class="search-bar--year bg-deepGray text-white px-4 py-2 rounded"
          >
            <option value="">Year</option>
            <option>2024</option>
            <option>2023</option>
            <option>2022</option>
          </select>

          <select
            class="search-bar--sort bg-deepGray text-white px-4 py-2 rounded"
          >
            <option value="">Sort By</option>
            <option value="rating">Rating</option>
            <option value="year">Release Year</option>
            <option value="title">Title</option>
          </select>
        </div>
      </section>

      <!-- MOVIE CARD -->
      <section
        class="movie-card--section grid gap-6 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4"
      >
        <!-- Dummy movie card -->
        <div
          class="movie-card--container bg-deepGray text-white rounded overflow-hidden shadow p-4 flex flex-col items-center"
        >
          <img
            src="./img/tmp/fight-club.jpg"
            alt="Movie Poster"
            class="movie-card--posterrounded mb-4"
          />
          <h2 class="movie-card--title text-lg font-bold text-neonMint mb-1">
            Fight Club
          </h2>
          <p class="movie-card--genre-year text-xs text-aquaGreen mb-1">
            Action | 1999
          </p>
          <p class="movie-card--rating text-xs mb-3">⭐ 9.5</p>
          <button class="movie-card--rent-btn">Rent</button>
        </div>
      </section>
    </main>

    <footer class="bg-deepGray text-center text-xs text-neonMint py-4 mt-10">
      © 2025 Retro Movie Rental. Built by Luffy & Batman.
    </footer>
  </body>
</html>
